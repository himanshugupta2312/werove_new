<svg viewBox="0 0 700 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a10"/>
      <stop offset="60%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#2d4a20"/>
    </linearGradient>
    <linearGradient id="moonGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="rgba(200,212,190,0.3)"/>
      <stop offset="100%" stop-color="rgba(200,212,190,0)"/>
    </linearGradient>
    <radialGradient id="moonGlowRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,212,190,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
  </defs>

  <rect width="700" height="900" fill="url(#skyGrad)"/>

  <!-- Moon glow -->
  <circle cx="540" cy="160" r="120" fill="url(#moonGlowRad)" opacity="0.8"/>
  <!-- Moon -->
  <circle cx="540" cy="160" r="45" fill="#e8dfc4" opacity="0.9" filter="url(#glow)"/>
  <circle cx="555" cy="148" r="38" fill="#1a2e1a"/>

  <!-- Stars -->
  <g fill="#c8d4be" opacity="0.6">
    <circle cx="80" cy="60" r="1.2"/><circle cx="150" cy="40" r="0.8"/><circle cx="200" cy="80" r="1"/><circle cx="320" cy="50" r="1.4"/><circle cx="400" cy="30" r="0.7"/><circle cx="450" cy="90" r="1.1"/><circle cx="100" cy="130" r="0.9"/><circle cx="280" cy="110" r="1.2"/><circle cx="60" cy="200" r="0.7"/><circle cx="380" cy="140" r="0.8"/><circle cx="620" cy="80" r="1"/><circle cx="660" cy="40" r="0.6"/><circle cx="30" cy="170" r="1.1"/><circle cx="500" cy="250" r="0.9"/>
  </g>

  <!-- Background trees (farthest) -->
  <g opacity="0.25" fill="#3d5a3e">
    <path d="M-30 900 L20 600 L70 900Z"/>
    <path d="M50 900 L110 550 L170 900Z"/>
    <path d="M140 900 L200 580 L260 900Z"/>
    <path d="M580 900 L640 560 L700 900Z"/>
    <path d="M620 900 L670 600 L720 900Z"/>
  </g>

  <!-- Mid trees -->
  <g opacity="0.5" fill="#2d4a2d">
    <path d="M-20 900 L50 500 L120 900Z"/>
    <path d="M80 900 L160 480 L240 900Z"/>
    <path d="M200 900 L280 520 L360 900Z"/>
    <path d="M500 900 L580 490 L660 900Z"/>
    <path d="M580 900 L650 510 L720 900Z"/>
  </g>

  <!-- Foreground trees (closest) -->
  <g fill="#1a2e1a">
    <path d="M-40 900 L60 380 L160 900Z"/>
    <path d="M20 900 L100 420 L180 900Z"/>
    <path d="M260 900 L360 300 L460 900Z"/>
    <path d="M290 900 L380 340 L470 900Z"/>
    <path d="M520 900 L620 360 L720 900Z"/>
    <path d="M560 900 L650 400 L740 900Z"/>
  </g>

  <!-- Trunk lines -->
  <g stroke="#0d1408" stroke-width="3" fill="none" opacity="0.8">
    <line x1="60" y1="900" x2="60" y2="600"/>
    <line x1="100" y1="900" x2="100" y2="580"/>
    <line x1="360" y1="900" x2="360" y2="550"/>
    <line x1="620" y1="900" x2="620" y2="560"/>
  </g>

  <!-- Ground mist -->
  <ellipse cx="350" cy="880" rx="400" ry="60" fill="rgba(200,212,190,0.08)"/>
  <ellipse cx="350" cy="900" rx="500" ry="80" fill="rgba(200,212,190,0.05)"/>

  <!-- Bird silhouettes -->
  <g fill="#c8d4be" opacity="0.8" filter="url(#glow)">
    <path d="M180 220 Q190 215 200 220 Q190 208 180 220Z"/>
    <path d="M202 218 Q214 213 222 218 Q212 207 202 218Z"/>
    <path d="M280 180 Q292 174 304 180 Q292 167 280 180Z"/>
    <path d="M306 178 Q319 172 329 178 Q317 165 306 178Z"/>
    <path d="M420 240 Q430 236 440 240 Q430 230 420 240Z"/>
    <path d="M442 238 Q453 233 461 238 Q451 228 442 238Z"/>
    <path d="M100 300 Q106 297 112 300 Q106 294 100 300Z"/>
    <path d="M114 299 Q120 296 125 299 Q119 293 114 299Z"/>
  </g>

  <!-- Tiger silhouette (subtle) -->
  <g opacity="0.35" fill="#c8853a">
    <ellipse cx="350" cy="820" rx="80" ry="20"/>
    <ellipse cx="310" cy="810" rx="30" ry="15"/>
    <path d="M295 800 Q305 785 310 800Z"/>
    <rect x="330" y="820" width="8" height="30" rx="4"/>
    <rect x="350" y="820" width="8" height="32" rx="4"/>
    <rect x="368" y="820" width="8" height="28" rx="4"/>
    <path d="M340 780 L360 770 L380 760 L390 780 L370 790 L350 795Z"/>
    <path d="M340 800 Q345 790 350 800" stroke="#1a2e1a" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M355 798 Q360 788 365 798" stroke="#1a2e1a" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M385 815 Q410 800 420 780 Q425 770 418 765" stroke="#c8853a" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <rect width="700" height="900" fill="url(#vignette)"/>
  <text x="50" y="860" font-family="'Space Mono', monospace" font-size="9" letter-spacing="6" fill="rgba(200,212,190,0.3)" text-transform="uppercase">INDIA · WILDLIFE</text>
</svg>
